<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinyisa Official</title>
    <!-- Mengambil font dari Google Fonts agar jenis tulisan mirip -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: linear-gradient(rgba(141, 107, 107, 0.75), rgba(114, 84, 84, 0.75)), 
                        url(latar\ web.jpeg) no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Kontainer Utama Ponsel */
        .container {
            width: 100%;
            max-width: 400px;
            background-color: rgba(141, 110, 110, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

                /* Logo Kinyisa Bulat Sempurna di Tengah */
        .logo-area {
            width: 110px;
            height: 110px;
            background-color: #ffffff;
            border-radius: 50%; /* Membuat kontainer menjadi bulat */
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden; /* MEMOTONG gambar kotak di dalamnya agar ikut bulat */
        }

        /* Mengatur gambar di dalam logo agar pas */
        .logo-area img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Memastikan gambar memenuhi lingkaran tanpa gepeng */
        }


        /* Replika Logo Simpel */
        .logo-icon {
            font-size: 24px;
            color: #333;
            line-height: 1;
        }
        .logo-text {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #2c2c2c;
            margin-top: 4px;
        }

        /* Judul */
        .headline {
            color: #f7e6db;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 25px;
        }

        /* Desain Tombol Utama */
        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px 20px;
            margin-bottom: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .btn-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }

        .btn-link svg, .btn-link span.emoji {
            margin-right: 10px;
            font-size: 18px;
            display: flex;
            align-items: center;
        }

        /* Warna Spesifik Tombol */
        .bg-cream {
            background-color: #f7e6db;
            color: #5c4646;
        }
        .bg-pink-soft {
            background-color: #f5c6c6;
            color: #5c4343;
        }
        .bg-rose-dark {
            background-color: #b08080;
            color: #f7e6db;
        }
        .bg-brown-dark {
            background-color: #946868;
            color: #f7e6db;
        }

        /* Banner Besar Shopee */
        .shopee-banner {
            border: 2px solid #f5c6c6;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 16px;
            background-size: cover;
            background-position: center;
            height: 220px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            /* Menggunakan gambar jilbab estetik sebagai contoh */
            background-image:url(latar\ soppe.jpeg);
        }

        .shopee-banner .btn-link {
            margin-bottom: 0;
            width: 90%;
        }

        /* Area Menu Grid (Pasmina & Segi Empat) */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .grid-card {
            background-color: #f7e6db;
            border-radius: 15px;
            padding: 10px;
            text-align: center;
        }

        .grid-title {
            font-size: 12px;
            font-weight: 700;
            color: #5c4646;
            margin-bottom: 8px;
        }

        .grid-image-box {
            width: 100%;
            height: 80px;
            background-color: #ddd;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
        }

        /* Simulasi jejeran warna kain dalam katalog */
        .color-bar {
            flex: 1;
            height: 100%;
        }
        .cb-1 { background-color: #8c766c; }
        .cb-2 { background-color: #bda69a; }
        .cb-3 { background-color: #d9cbcf; }
        .cb-4 { background-color: #e3dcd5; }
        .cb-5 { background-color: #383431; }
    </style>
</head>
<body>

</body>
</html>
